<div id="Container12" class="row [NAB.Container12_effect]" ng-style="NAB.Container12_style" ng-hide="NAB.Container12_hidden" ng-disabled="NAB.Container12_disabled"><html><body><center><br><br>
	<p><a href="img\solista.jpg" target="_blank" title="Solista"><img height="400" src="img\solista.jpg"/></a></p><br><div>Corría el año 1992 cuando me compraron mi primera guitarra; a la vez que en mi Concepción del Uruguay comenzaban a implementarse los Talleres Culturales Barriales (municipales y gratuitos).</div><div>Empezamos con mis primos y con mi hermano a concurrir en la sede del Club Almagro. Allí conocimos a Alberto Benítez, Fabián Galarraga y Marcelo Campo; nuestros primeros maestros de canto y guitarra.</div><div>Años más tarde se sumaría al equipo de estudiantes mi padre Miguel (El Gaucho Mercié) y contaríamos como profesor también a Rodolfo Maddalena.</div><div><br/></div><div>A partir de esos años fui parte de varios grupos de compañeros, compinches y amigos en la música...</div>
	<figure>

    <figcaption></figcaption>
  </figure>
<br>
	<p><a href="img\tabai.jpg" target="_blank" title="Conjunto 'Los Tabaí'"><img height="400" src="img\tabai.jpg"/></a></p><br><p>
Primero formamos el grupo &quot;<b>Los Tabaí</b>&quot;, con mi primo Guillermo Muñoz y Ricardo Martín (posteriormente se sumaría Walter Martín en el bajo) (años 1995-1998 aprox.)
</p>

	<div>Luego nos incorporamos junto a Rodrigo López a un conjunto chamamecero de Colón: &quot;<b>Sergio Pinget y su conjunto</b>&quot;.</div><div>Acompañaron también Federico Premat y Daniel Follonier. Llegamos a grabar dos casets en Paysandú. Además nos presentamos en la Fiesta Nacional de la Artesanía como grupo soporte de Soledad Pastoruti. (años 1998-1999 aprox.)</div>
<br>
	<p><a href="img\pinget.jpg" target="_blank" title="Sergio Pinget y su conjunto"><img height="400" src="img\pinget.jpg"/></a></p>
<br>

	<p></p><p>
Años más tarde formé parte del grupo &quot;<b>Acullá</b></p>
<br>
	<p><a href="img\aculla.jpg" target="_blank" title="Conjunto 'Acullá'"><img height="400" src="img\aculla.jpg"/></a></p><br>
	<div>En esos años además de grupos de folklore, integré un grupo de cumbia llamado &quot;<b>Omega</b>&quot;, y dos dúos; &quot;&quot; con mi amigo Julio Vérnaz, y &quot;&quot; con mi primo Eduardo &quot;Tito&quot; Sánchez.</div><div><br/></div><div>Otro de los grupos que marcaron mis años posteriores fueron &quot;<b>Río de Voces</b>&quot; (no hay registro fotográfico pero estaba integrado por Paola Izaguirre, Nicolás Rizo, Claudio Pérez y Lisandro González)</div><div><br/></div><div>Y antes de llegar a mi carrera solista y más creativa, formé parte de un grupo de folk-rock llamado &quot;<b>Trébol</b>&quot;, junto a los amigos Iván Pastorini, Agustín García y Tomás Ballay.</div><div><br/></div><div>Personalmente, me gusta pensar que estas dos últimas experiencias &quot;aún no han bajado del todo el telón...&quot;</div>
	<p></p><br>
	<p><a href="img\vanguardia.jpg" target="_blank" title="La Vanguardia"><img height="320" src="img\vanguardia.jpg"/></a></p>
	<p><br>
La Vanguardia (con mi primo Tito)
</p>
	<p></p><br>
	<p><a href="img\familia1.jpg" target="_blank"><img height="400" src="img\familia1.jpg"/></a></p>
	<p><br>
Acompañando a mi padre, el Gaucho Mercié
</p>
	<p></p><br>
	<p><a href="img\trebol.jpg" target="_blank" title="Grupo Trébol"><img height="320" src="img\trebol.jpg"/></a></p>
	<p><br>
Grupo Trébol en una de nuestras geniales &quot;cantatas&quot;
</p>
	<p></p>

<p></p>
	<p><a href="img\riodevoces.jpg" target="_blank" title="Río de Voces"><img height="290" src="img\riodevoces.jpg"/></a></p>
	<p><br>
Otra vuelta de tuerca a las músicas con el conjunto "Río de Voces"
</p><br><br>
	<p><a href="img\familia2.jpg" target="_blank"><img height="320" src="img\familia2.jpg"/></a></p><br>
	<div align="center">Con mi hermano Juan Pablo,con quien &quot;nunca dejamos el arte...&quot;</div>
<br><br><br>
</center></body></html>

<script type="text/ng-template" id="libros">
<div id="libros">
<div id="Titulo" class="row [NAB.Titulo_effect]" ng-style="NAB.Titulo_style" ng-hide="NAB.Titulo_hidden" ng-disabled="NAB.Titulo_disabled">
<div id="Container1" class="col-sm-10 [NAB.Container1_effect]" ng-style="NAB.Container1_style" ng-hide="NAB.Container1_hidden" ng-disabled="NAB.Container1_disabled" ng-click="Container1_click()"><div align="right">&nbsp;&nbsp;&nbsp;<h3><font color="#FFFFFF" size="6" face="Tahoma">ricardocontard</font><font color="#0392CE" size="6" face="Tahoma">.ml</font></h3></div>
</div>
<div id="logo" class="col-sm-2 [NAB.logo_effect]" ng-style="NAB.logo_style" ng-hide="NAB.logo_hidden" ng-disabled="NAB.logo_disabled" ng-click="logo_click()"><div align="left"><img src="img\cara.png" height="80"></div>
</div>

<div id="Paragraph1" class="row [NAB.Paragraph1_effect]" ng-style="NAB.Paragraph1_style" ng-hide="NAB.Paragraph1_hidden" ng-disabled="NAB.Paragraph1_disabled"><br><img src="img\mislibros.jpg" height="200" align="center"><br><br>Corta un trozo de madera y brotará una historia. Levanta una piedra del camino y aparecerá un verso. Mira detrás del ropero y hallarás anécdotas. Corre las cortinas y te iluminarán los cuentos del paisaje. Revisa viejos cuadernos y te encontrarás con las leyendas y mitos de los antepasados de la persona que sos hoy.<br>Porque somos las historias que inventamos día a día. Porque somos el libreto de la obra de la vida. Constituidos por palabras, oraciones y versos, vamos caminando hacia la última página.<br><br>En esta antología resumo mis días, palabras, cuentos y versos; para que no se me pierdan en el eterno olvido del tiempo.<br><hr><br><body> <center><a target="_blank" href="https://drive.google.com/file/d/1f63RQL-dkfc3nlpfe6tBT0m0Vn2mby5v/view?usp=sharing"><h4>Los relatos del Señor Tiempo</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1DPVUdJtzjfsjVvyoPBJjlHvAoBdzseqE/view?usp=sharing"><h4>El tren de los Vendedores de Teorías</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1aUk1yRIsYSnanJBpYrq6_8Ik2lplWDtp/view?usp=sharing"><h4>Páginas...</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1cjax-VzJwG8STKr1PD2FvAwliW_NkkdV/view?usp=sharing"><h4>Apoteosis</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1E0nP9W5cdPOLAzYTdaXSnyPjPnhqd-1z/view?usp=sharing"><h4>Un viaje increíble</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1WLbF8We7arsdcAP9nZErGSC5TI3IhVDq/view?usp=sharing"><h4>Los laberintos</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1-IVJfKIsIppmJXuPTUkc3OK9dvsgpSLY/view?usp=sharing"><h4>Cronología simple de un verdadero amor</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1XuGT3NHiruvX2P-FZ-SsIp55eyQjOSFm/view?usp=sharing"><h4>Poesías y cuentos</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1yeXusCIv1PeoQifdYVyGy0rKhFErCBsV/view?usp=sharing"><h4>Casas de locos</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/10FgVKo-jB78y2n2A0tS7boR4QOI2b-Xh/view?usp=sharing"><h4>La leyenda del sol</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1v0bNRDmNhqy1mJHdYu5a5SS1kiZhQ9Rv/view?usp=sharing"><h4>Cancionero</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1-WyOfbA40P8ZhR59-T9N7U5SXHDrsNoO/view?usp=sharing"><h4>Cuaderno de notas</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1IQfoec-TpOIXJ48SJmCTuFynLqOkkWkn/view?usp=sharing"><h4>El hombre cabeza de caballo</h4></a></center><br><center><a target="_blank" href="https://drive.google.com/file/d/1dz86XCdQDeTES_gA_-r5qg33u15YPv87/view?usp=sharing"><h4>La magia sigue intacta</h4></a></center><br></body><br><hr><center><img src="img\libros.png" height="90"><br>NOTA: Por cuestiones legales (Ley 11.723) los lectores<br>no podrán imprimir ni descargar los archivos presentados.</center><hr><br><body><div align="center"><b>Premios literarios</b></div><div align="center"><br></div><div align="center"><br></div><div>-&nbsp;<b>2º Premio</b>&nbsp;en el &quot;V Concurso&nbsp; de poemas y poesías&quot; en la E.P.N.M. &quot;Héctor de Elía&quot; (Colonia Elía, Entre Ríos) 30/09/1999</div><div><br></div><div>-&nbsp;<b>3º Premio</b>&nbsp; Categoría &quot;B&quot; en el &quot;VIII Concurso&nbsp; de poesías&quot; en la E.P.N.M. &quot;Héctor de Elía&quot; (Colonia Elía, Entre Ríos) con la poesía &quot;Yo fui sol&quot; 27/09/2002</div><div><br></div><div>-&nbsp;<b>Finalista</b>&nbsp;en el &quot;VI Certamen Internacional De Los Cuatro Vientos de Poesía y Narrativa Breve&quot; (Editorial DE LOS CUATRO VIENTOS de Buenos Aires) integrando la antología &quot;Homenaje a Oliverio Girondo&quot; 13/12/2003</div><div><br></div><div>-&nbsp;<b>Mención</b>&nbsp;Categoría &quot;B&quot; en el &quot;XI Concurso&nbsp; de poesías y cuentos cortos&quot; en la E.P.N.M. &quot;Héctor de Elía&quot; (Colonia Elía, Entre Ríos) 16/09/2005</div><div><br></div><div>-&nbsp;<b>1º Premio</b>&nbsp;Cuentos Categoría &quot;B&quot; en el &quot;XVII Concurso&nbsp; de poesías y cuentos cortos&quot; en la E.P.N.M. &quot;Héctor de Elía&quot; (Colonia Elía, Entre Ríos) 18/12/2011</div><div><br></div><div>-&nbsp;<b>2º Premio</b>&nbsp;Poesía y&nbsp;<b>3º Premio</b>&nbsp;Cuentos Categoría &quot;B&quot; en el &quot;XVIII Concurso&nbsp; de poesías y cuentos cortos&quot; en la E.P.N.M. &quot;Héctor de Elía&quot; (Colonia Elía, Entre Ríos) Nov. de 2012</div><div><br></div><div>-&nbsp;<b>2° Premio</b>&nbsp;en el &quot;XIX Concurso de Poesía y Cuentos Cortos&quot; de la EPNM &quot;Héctor de Elía&quot; con el cuento &quot;Las puertas&quot;. Noviembre de 2013</div><div><br></div><div>-&nbsp;<b>2° Premio</b>&nbsp;en categoría B (cuentos) en el &quot;XX Concurso de Poesía y Cuentos Cortos&quot; de la EPNM &quot;Héctor de Elía&quot;. Octubre de 2014</div><div><br></div><div>-&nbsp;<b>1° y 2° Premios</b>&nbsp;en categoría B (cuentos) en el &quot;XXI Concurso de Poesía y Cuentos Cortos&quot; de la EPNM &quot;Héctor de Elía&quot;. Noviembre de 2015</div><div><br></div><div>-&nbsp;<b>1° Premio</b>&nbsp;y&nbsp;<b>RECONOCIMIENTO</b>&nbsp;en categoría B (cuentos) en el &quot;XXII Concurso de Poesía y Cuentos Cortos&quot; de la EPNM &quot;Héctor de Elía&quot; en 2016</div><div><br></div><div>-&nbsp;<b>2º Premio</b>&nbsp;Categoría Mayores en el &quot;1º CONCURSO DE POESÍA DEL SUM DE LA CANTERA 25&quot; con la poesía &quot;Conjuro&quot; (Concepción del Uruguay) en mayo de 2017</div><div><br></div><div>-&nbsp;<b>2º Premio</b>&nbsp;(poesía) y&nbsp;<b>3º Premio</b>&nbsp;(cuento) en el &quot;XXIII CONCURSO PROVINCIAL DE POESÍAS Y CUENTOS CORTOS&quot; de la EPNM &quot;Héctor de Elía&quot; en 2017</div></body><br><hr><br><img align="center" src="img\caballo.jpg" height="400"><br><br><div align="center">1ª edición</div><div align="center"><br></div><div align="center">© Ricardo Martín Contard, 2018</div><div align="center"><br></div><div align="center">© Edición y publicación del autor, 2018</div><div align="center"><br></div><div align="center">© Impreso en Librería “Mis colores”; 33 del Oeste Sur 63, Villa Las Lomas Sur,</div><div align="center"><br></div><div align="center">Concepción del Uruguay, Entre Ríos. 2019</div><div align="center"><br></div><div align="center">ISBN: 978-987-42-8887-5</div><div align="center"><br></div><div align="center">Impreso en la Argentina.</div><div align="center"><br></div><div align="center">Hecho el depósito que previene la ley 11.723.</div><div align="center"><br></div><div align="center">Todos los derechos reservados. Esta publicación no puede ser reproducida, ni en todo ni en parte, ni registrada en, o transmitida por un sistema de recuperación de información, en ninguna forma ni por ningún medio, sea mecánico, fotoquímico, electrónico, magnético, electroóptico, por fotocopia o cualquier otro, sin permiso previo por escrito del titular del copycenter.</div><div align="center"><br></div><div align="center"><i>No lo hagan en sus casas, cómprenlo hecho</i></div></div>

<script type="text/ng-template" id="bio">
<div id="bio">
<div id="Titulo" class="row [NAB.Titulo_effect]" ng-style="NAB.Titulo_style" ng-hide="NAB.Titulo_hidden" ng-disabled="NAB.Titulo_disabled">
<div id="Container1" class="col-sm-10 [NAB.Container1_effect]" ng-style="NAB.Container1_style" ng-hide="NAB.Container1_hidden" ng-disabled="NAB.Container1_disabled" ng-click="Container1_click()"><div align="right">&nbsp;&nbsp;&nbsp;<h3><font color="#FFFFFF" size="6" face="Tahoma">ricardocontard</font><font color="#0392CE" size="6" face="Tahoma">.ml</font></h3></div>
</div>
<div id="logo" class="col-sm-2 [NAB.logo_effect]" ng-style="NAB.logo_style" ng-hide="NAB.logo_hidden" ng-disabled="NAB.logo_disabled" ng-click="logo_click()"><div align="left"><img src="img\cara.png" height="80"></div>
</div>
</div>
<div id="Paragraph3" class="[NAB.Paragraph3_effect]" ng-style="NAB.Paragraph3_style" ng-hide="NAB.Paragraph3_hidden" ng-disabled="NAB.Paragraph3_disabled"><p>Promediaba el cuarto día del noviembre del año 1980 cuando llegué a la vida. Mi madre; Viviana Amarillo aún no se casaba con mi padre; Miguel Contard; faltaba poco...<br>Algunos años después llegaba mi hermano Juan Pablo, y así quedó conformado el escenario ideal para crecer, jugar, explorar, intentar, formarme, avanzar y llegar hasta hoy.<br>Una infancia genial es lo mejor que se puede tener. Con el tiempo nos fuimos dando cuenta que el mejor regalo que nos pudieron dar nuestros padres fue no darnos todo, sino lo necesario.</p><p>Me gusta viajar. Quizás nuestras vacaciones de niño no eran como las de los chicos de hoy día (el mar, las montañas nevadas, Disney con mucha "suerte"). Nosotros al terminar las clases cada año nos subíamos al Renault Doupín con arranque a manija y visitábamos parientes en varios puntos de nuestra provincia de Entre Ríos, desde Colón hasta Clarita, pasando por San José y Villa Elisa; para luego regresar por San Salvador y Villaguay. Todas ciudades hermosas con gente inolvidable. Nos llegábamos a quedar varios días a veces, y otras sólo de paso a compartir una tarde o un mediodía.</p><p>Me gustan las películas. Quizás porque cuando éramos chicos jugábamos con mi primo Lucas a coleccionar "carteleras" o afiches de cine que aparecían en los diarios de la época. Nuestro periódico local (el <strong><em>La Calle</em></strong>) tenía una página de Sociales, mientras el <em><strong>La Nación</strong></em> que me traía mi madre de la casa de familia donde trabajaba, tenía toda una sección entera dedicada a las películas en cartel.<br>Además a veces conseguíamos afiches reales del Cine local que servían para empapelar temporalmente nuestra pieza.</p><p>Me gusta la música. Quizás la afición proviene de mi padre, que siendo aún joven, al entrar a la Policía Federal, ya empuñaba una guitarra animando las farrungas con los compañeros.<br>Si bien esa misma guitarra, cuando éramos apenas púberes la usábamos como un juguete más y eso devino en su deterioro y olvido total.<br>Más tarde, cuando yo tenía 12 años comenzamos de nuevo con la ambición de aprender de la mano de los Talleres Municipales de canto y guitarra. Incluso mis padres se sumaron con el tiempo a aprender las artes musicales con nosotros.<br>Por supuesto que es una costumbre que no he dejado, y siempre encuentro algún pretexto para volver a empuñar la guitarra y entonar alguna que otra balada, mía o de otros.</p><p>Todo esto se relaciona también con el gusto por leer y escribir. Aunque no soy un muy ávido lector, suelo deleitarme con obras de Javier Villafañe, Julio Verne o Constancio Vigil, entre otros...<br>Y de vez en vez me gusta sentarme y divagar historias, plasmándolas en papel como queriendo dejar una huella ante el inescrupuloso paso del tiempo.<br>Tales "vicios" me han llevado por varios caminos, en los que conocí mucha gente y he vivido experiencias muy enriquecedoras.</p><p>Desde niño me regalaron libros, sobre todo la patrona de mi madre, la señora Charo; quien después de los años de secundaria sería una de mis profesoras y mentoras en mi faceta profesional bibliotecológica.<br>Estudié la carrera de Bibliotecología con el mejor grupo de amigos que pude llegar a tener. Después de recibirme y tras un año de búsqueda conseguí una suplencia de 20 días en una escuela de Villa Elisa. Ahí conocí gente que al año siguiente (2003) me contactó con la siguiente institución que me recibiría en su biblioteca: la Escuela Nº 19 "9 de Julio" de La Clarita.<br>Así que el pueblo donde visitábamos a una de las tías de mi padre cuando niños, se convertía en mi segundo hogar durante 5 años consecutivos. Tiempo rico en experiencias como catequesis, un grupo de rock con amigos, la filmación de mi primera película con ellos y con el resto de la gente, y largas jornadas que llegaron a reflejarse en canciones y algunos cuentos...</p><p>A la vez, y para no perder tiempo, le daba "otra vuelta de tuerca" a mi historia en lo que a los vínculos se refiere. En 2003 conocía a mi amiga Marisol. Después, mi novia Marisol. Y hoy, mi esposa y compañera eterna Marisol.<br>Y ahora también puedo decir que "completo" es una de las palabras que más me definen. Gracias a Ella, y a nuestros frutos: Valentino (14) y Victoria (9).<br>Ellos me acompañan y apoyan en todos mis proyectos como persona. Desde mis caprichos musicales y literarios, hasta mis trabajos como bibliotecario escolar y como profesor de Clasificación en la carrera de Bibliotecología que oferta la Universidad Autónoma de Entre Ríos, en mi natal Concepción del Uruguay.</p><p>Todo lo demás, son detalles. Para dar cuenta de varios de esos detalles, existen en la nube páginas como éstas.</p><p>***</p><p>(Junio de 2021)</p><br><br><div align="center"><img src="img\dibujo.jpg" height="250"><br><br><a href="https://drive.google.com/file/d/1c9-C6elT313X0WcHBzY5UuoxcbVJBnHq/view?usp=sharing" target="_blank">Chusmear CV</a><br></div></div>
</div>
</script>
